name: nexchat
description: "NexChat - Modern Messaging App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.3
  dio: ^5.3.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  permission_handler: ^11.0.1
  flutter_local_notifications: ^21.0.0
  crypto: ^3.0.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.1
  uuid: ^4.2.1
  flutter_launcher_icons: ^0.14.4
  firebase_messaging: ^16.1.2
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
